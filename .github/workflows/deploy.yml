name: Harry Potter App - CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: ?? Checkout Code
        uses: actions/checkout@v4

      - name: ?? Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: ?? Build Docker Image
        run: |
          cd vite-project
          docker build -t piyushchopade/harry-potter-app:${{ github.run_number }} .
          docker tag piyushchopade/harry-potter-app:${{ github.run_number }} piyushchopade/harry-potter-app:latest

      - name: ?? Push Docker Image to DockerHub
        run: |
          docker push piyushchopade/harry-potter-app:${{ github.run_number }}
          docker push piyushchopade/harry-potter-app:latest

      - name: ?? Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop harry-potter-app || true
            docker rm harry-potter-app   || true
            docker pull piyushchopade/harry-potter-app:latest
            docker run -d \
              --name harry-potter-app \
              --restart unless-stopped \
              -p 80:80 \
              piyushchopade/harry-potter-app:latest
            echo "? Harry Potter App is LIVE!"
